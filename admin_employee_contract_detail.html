{% extends "base.html" %}

{% block content %}

<h1>Contract {{contract_id}}</h1>

<div class="employee-tabs">

<a class="tab"
href="/admin/employee/{{emp_id}}">
Personal Details
</a>

<a class="tab active"
href="/admin/employee/{{emp_id}}/contracts">
Contracts
</a>

<a class="tab"
href="/admin/employee/{{emp_id}}/certificates">
Certificates
</a>

<a class="tab"
href="/admin/employee/{{emp_id}}/health">
Health
</a>

<a class="tab"
href="/admin/employee/{{emp_id}}/assets">
Staff Assets
</a>

<a class="tab"
href="/admin/employee/{{emp_id}}/training">
Training
</a>

</div>

<div style="margin-top:30px">

<iframe
src="/static/contracts/contract{{contract_id}}.pdf"
width="100%"
height="800px">
</iframe>

</div>


<style>
table{width:100%;border-collapse:collapse;}
table th,table td{padding:10px 12px;text-align:left;border-bottom:1px solid #e5e7eb;font-size:14px;}
table th{background:#f9fafb;font-weight:600;color:#374151;}
@media(max-width:900px){
  table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;}
  table th,table td{padding:8px 10px;font-size:13px;}
  .btn,button[type=submit]{width:100%;margin-bottom:8px;}
  h1{font-size:20px;}
  h2{font-size:18px;}
  .grid{grid-template-columns:1fr !important;}
}
</style>

{% endblock %}
