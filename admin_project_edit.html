{% extends "base.html" %}

{% block content %}

<h1>{% if project %}Edit Project{% else %}Create Project{% endif %}</h1>

<form method="post"
      action="{% if project %}/admin/project/update/{{ project[0] }}{% else %}/admin/project/create{% endif %}"
      class="employee-edit-form">

    <div class="employee-form-grid">

        <div class="form-group">
            <label>Project Code</label>
            <input type="text" name="project_code" value="{{ project[1] if project else '' }}" required>
        </div>

        <div class="form-group">
            <label>Project Title</label>
            <input type="text" name="project_title" value="{{ project[2] if project else '' }}">
        </div>

        <div class="form-group">
            <label>Ship</label>
            <select name="ship_id" required>
                <option value="">Select Ship</option>
                {% for ship in ships %}
                <option value="{{ ship[0] }}"
                    {% if project and project[3] == ship[0] %}selected{% endif %}>
                    {{ ship[1] }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Customer</label>
            <select name="customer_id" required>
                <option value="">Select Customer</option>
                {% for customer in customers %}
                <option value="{{ customer[0] }}"
                    {% if project and project[4] == customer[0] %}selected{% endif %}>
                    {{ customer[1] }} {{ customer[2] }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Project Leader</label>
            <select name="project_leader_id" required>
                <option value="">Select Project Leader</option>
                {% for leader in project_leaders %}
                <option value="{{ leader[0] }}"
                    {% if project and project[5] == leader[0] %}selected{% endif %}>
                    {{ leader[1] }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="Open" {% if project and project[6] == "Open" %}selected{% endif %}>Open</option>
                <option value="In Progress" {% if project and project[6] == "In Progress" %}selected{% endif %}>In Progress</option>
                <option value="Waiting Customer" {% if project and project[6] == "Waiting Customer" %}selected{% endif %}>Waiting Customer</option>
                <option value="Closed" {% if project and project[6] == "Closed" %}selected{% endif %}>Closed</option>
            </select>
        </div>

    </div>

    <div style="margin-top:20px;">
        <button type="submit" class="register-btn">{% if project %}Update Project{% else %}Save Project{% endif %}</button>
        <a href="/admin/projects" class="download-btn" style="text-decoration:none;">Back</a>
    </div>

</form>

<style>
.employee-edit-form{
    max-width:1200px;
}

.employee-form-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:18px;
    margin-top:20px;
}

.form-group label{
    display:block;
    font-weight:600;
    margin-bottom:8px;
}

.form-group input,
.form-group select{
    width:100%;
    padding:12px;
    border:1px solid #d7dce3;
    border-radius:10px;
    background:#fff;
    box-sizing:border-box;
}
</style>


<style>
table{width:100%;border-collapse:collapse;}
table th,table td{padding:10px 12px;text-align:left;border-bottom:1px solid #e5e7eb;font-size:14px;}
table th{background:#f9fafb;font-weight:600;color:#374151;}
@media(max-width:900px){
  table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;}
  table th,table td{padding:8px 10px;font-size:13px;}
  .btn,button[type=submit]{width:100%;margin-bottom:8px;}
  h1{font-size:20px;}
  h2{font-size:18px;}
  .grid{grid-template-columns:1fr !important;}
}
</style>

{% endblock %}
